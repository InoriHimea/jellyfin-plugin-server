services:
  jellyfin-plugin-server:
    image: ghcr.io/inorihimea/jellyfin-plugin-server:latest
    container_name: jellyfin-plugin-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      JPSERVER_DATA_DIR: /data
      JPSERVER_LOG_JSON: "true"
      # JPSERVER_PORT: "8080"
      # JPSERVER_MAX_DISK_MB: "20480"
      # JPSERVER_MAX_CONCURRENT_DL: "4"
